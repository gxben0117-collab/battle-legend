<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Icon Sprite Generator</title>
</head>
<body>
<h1>ең–жЁҷ Sprite з”ҹжҲҗеҷЁ</h1>
<p>йҖҷеҖӢе·Ҙе…·жңғжҠҠ emoji иҪүжҸӣжҲҗ PNG ең–зүҮ</p>

<canvas id="canvas" width="64" height="64" style="border:1px solid #ccc"></canvas>
<div id="output"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const output = document.getElementById('output');

// еҚЎзүҢ emoji жҳ е°„иЎЁ
const iconMap = {
  'knight': 'вҡ”пёҸ',
  'warrior': 'рҹӘ“',
  'archer': 'рҹҸ№',
  'mage': 'рҹ”®',
  'assassin': 'рҹ—ЎпёҸ',
  'tank': 'рҹӣЎпёҸ',
  'priest': 'вңЁ',
  'necro': 'рҹ’Җ',
  'shield-guard': 'рҹӣЎпёҸ',
  'light-cavalry': 'рҹҸҮ',
  'sniper': 'рҹҺҜ',
  'sword-master': 'вҡ”пёҸ',
  'aerial-archer': 'рҹҰ…',
  'novice-monk': 'рҹ“ҝ',
  'thunder-mage': 'вҡЎ',
  'ice-mage': 'вқ„пёҸ',
  'wind-walker': 'рҹҢӘпёҸ',
  'inferno-mage': 'рҹ”Ҙ',
  'boss-shadow-lord': 'рҹ‘№',
  'boss-inferno-dragon': 'рҹҗү',
  'berserker': 'рҹӘ“',
  'paladin': 'вҡңпёҸ',
  'ranger': 'рҹҸ№',
  'battle-mage': 'рҹ”®',
  'shadow-blade': 'рҹ—ЎпёҸ',
  'frost-knight': 'рҹ§Ҡ',
  'oracle': 'рҹ”Ҝ',
  'demon-hunter': 'рҹҳҲ',
  'earth-shaman': 'рҹҢҚ',
  'void-walker': 'рҹҢҖ'
};

// зү№ж•Ҳ emoji
const effectMap = {
  'slash': 'вҡ”пёҸ',
  'arrow': 'рҹҸ№',
  'magic': 'рҹ”Ҙ'
};

function generateIcon(id, emoji) {
  ctx.clearRect(0, 0, 64, 64);

  // иғҢжҷҜ
  const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
  gradient.addColorStop(0, 'rgba(30, 40, 60, 0.9)');
  gradient.addColorStop(1, 'rgba(10, 15, 25, 0.95)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 64, 64);

  // Emoji
  ctx.font = '42px "Segoe UI Emoji", "Apple Color Emoji"';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, 32, 32);

  // йӮҠжЎҶ
  ctx.strokeStyle = 'rgba(100, 150, 200, 0.3)';
  ctx.lineWidth = 2;
  ctx.strokeRect(1, 1, 62, 62);

  return canvas.toDataURL('image/png');
}

// з”ҹжҲҗжүҖжңүең–жЁҷ
let html = '<h2>еҚЎзүҢең–жЁҷ</h2>';
for (let [id, emoji] of Object.entries(iconMap)) {
  const dataUrl = generateIcon(id, emoji);
  html += `
    <div style="display:inline-block; margin:10px; text-align:center;">
      <img src="${dataUrl}" style="width:64px; height:64px;">
      <div>${id}</div>
      <a href="${dataUrl}" download="${id}.png">дёӢијү</a>
    </div>
  `;
}

html += '<h2>зү№ж•Ҳең–жЁҷ</h2>';
for (let [id, emoji] of Object.entries(effectMap)) {
  const dataUrl = generateIcon(id, emoji);
  html += `
    <div style="display:inline-block; margin:10px; text-align:center;">
      <img src="${dataUrl}" style="width:64px; height:64px;">
      <div>${id}</div>
      <a href="${dataUrl}" download="effect-${id}.png">дёӢијү</a>
    </div>
  `;
}

output.innerHTML = html;

console.log('з”ҹжҲҗе®ҢжҲҗпјҒеҸҜд»ҘеҸійҚөй»һж“ҠжҜҸеҖӢең–жЁҷдёӢијүпјҢжҲ–дҪҝз”Ёд»ҘдёӢи…іжң¬жү№йҮҸдёӢијүпјҡ');
console.log('жүҖжңүең–жЁҷе·Із”ҹжҲҗпјҢи«ӢжүӢеӢ•дёӢијүеҲ° assets/icons/ зӣ®йҢ„');
</script>
</body>
</html>
